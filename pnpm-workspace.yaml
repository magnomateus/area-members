# Configuracao do pnpm. Em pnpm 10+ as settings vivem aqui (nao mais em package.json).
# Dependencias autorizadas a rodar build scripts (postinstall) — pnpm bloqueia por padrao.
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
