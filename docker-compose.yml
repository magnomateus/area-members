services:
  postgres:
    image: postgres:16-alpine
    container_name: vis-membros-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vis_membros_dev
    # Host 5433 -> container 5432 (5432 do host esta em uso por outro projeto local)
    ports:
      - "5433:5432"
    volumes:
      - vis_membros_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vis_membros_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vis_membros_pgdata:
